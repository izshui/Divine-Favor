<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 富文本编辑器</title>
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f1f3f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 20px; }
        .admin-tabs { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .admin-tab {
            background: #e9ecef;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .admin-tab.active { background: #b78c5a; color: white; }
        .section { margin-top: 28px; border-top: 1px solid #eee; padding-top: 20px; }
        .sub-badge {
            background: #eef2f3;
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-right: 12px;
            margin-bottom: 12px;
        }
        .del-sub { background: #dc3545; color: white; border: none; border-radius: 30px; padding: 2px 12px; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 10px; border-radius: 28px; border: 1px solid #ddd; }
        button { background: #b78c5a; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; }
        #editor-container { border: 1px solid #ddd; border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
        .content-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-content { background: #dc3545; padding: 6px 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 内容管理后台（富文本）</h1>
    <div class="admin-tabs">
        <button class="admin-tab" data-parent="prayer">祈祷</button>
        <button class="admin-tab" data-parent="song">歌曲</button>
        <button class="admin-tab" data-parent="bible">圣经</button>
        <button class="admin-tab" data-parent="about">关于</button>
    </div>

    <!-- 子分类管理 -->
    <div class="section">
        <h3>📂 子分类管理</h3>
        <div id="subListAdmin"></div>
        <div style="display: flex; gap: 10px; margin-top: 12px;">
            <input type="text" id="newSubName" placeholder="新子分类名称" style="flex:1">
            <button id="addSubBtn">➕ 添加</button>
        </div>
    </div>

    <!-- 发布内容区域 -->
    <div class="section">
        <h3>✏️ 发布新内容</h3>
        <div class="form-group">
            <label>选择子分类</label>
            <select id="uploadSubSelect"></select>
        </div>
        <div class="form-group">
            <label>标题</label>
            <input id="titleInput" placeholder="标题">
        </div>
        <div class="form-group">
            <label>正文（富文本）</label>
            <div id="editor-container"></div>
        </div>
        <button id="publishBtn">📤 发布</button>
    </div>

    <!-- 已有内容管理 -->
    <div class="section">
        <h3>🗂️ 管理已有内容</h3>
        <div class="form-group">
            <label>筛选子分类</label>
            <select id="filterSubSelect"></select>
        </div>
        <div id="contentsListAdmin"></div>
    </div>
</div>

<script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
<script>
    const API_BASE = '';
    let currentParent = 'prayer';
    let editor = null;

    async function apiFetch(url, options = {}) {
        const res = await fetch(API_BASE + url, options);
        if (!res.ok) throw new Error(await res.text() || '请求失败');
        return res.json();
    }

    // 初始化富文本编辑器，并配置上传
    async function initEditor() {
        const { createEditor, createToolbar } = window.wangEditor;
        
        // 自定义上传图片
        const imageUploadConfig = {
            server: API_BASE + '/api/upload',
            fieldName: 'file',
            maxFileSize: 5 * 1024 * 1024,
            allowedFileTypes: ['image/*'],
            // 自定义上传成功后的返回值解析
            customInsert: (res, insertFn) => {
                // res 是服务端返回的 JSON
                if (res.url) {
                    insertFn(res.url);
                } else {
                    console.error('上传失败', res);
                }
            },
        };
        
        // 自定义上传音频（wangEditor默认不支持音频，需要自定义菜单或使用 embed 方式，这里简单实现：通过插入 audio 标签）
        // 更好的方式：使用自定义菜单，但为了简化，我们提供一个单独的按钮，通过文件上传后插入 audio 标签。
        // 但用户需要的是“音频上传按钮”，官方 toolbar 没有直接音频按钮，需要自定义菜单。
        // 这里我们增加一个自定义按钮，点击后上传音频并插入 audio 标签。
        
        const editorConfig = {
            placeholder: '在这里编写图文、插入音频...',
            MENU_CONF: {
                uploadImage: imageUploadConfig,
                // 添加自定义音频上传菜单
            },
        };
        
        editor = createEditor({
            selector: '#editor-container',
            html: '',
            config: editorConfig,
        });
        
        // 创建默认工具栏
        const toolbarConfig = {
            toolbarKeys: [
                'bold', 'italic', 'underline', 'color', 'bgColor', 'fontSize', 'fontFamily',
                'justifyLeft', 'justifyCenter', 'justifyRight', 'justifyJustify', 'lineHeight',
                'insertLink', 'uploadImage', 'insertTable', 'codeBlock', 'undo', 'redo'
            ],
        };
        createToolbar({ editor, selector: '#editor-container', config: toolbarConfig });
        
        // 添加一个自定义音频上传按钮（因为官方未内置音频，手动实现）
        const audioButton = document.createElement('button');
        audioButton.textContent = '🎵 插入音频';
        audioButton.style.margin = '4px';
        audioButton.style.padding = '4px 12px';
        audioButton.style.borderRadius = '20px';
        audioButton.style.border = '1px solid #b78c5a';
        audioButton.style.background = 'white';
        audioButton.style.cursor = 'pointer';
        audioButton.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch(API_BASE + '/api/upload', {
                    method: 'POST',
                    body: formData,
                });
                const data = await res.json();
                if (data.url) {
                    const audioHtml = `<audio controls src="${data.url}" style="max-width:100%;"></audio>`;
                    editor.insertHtml(audioHtml);
                } else {
                    alert('音频上传失败');
                }
            };
            input.click();
        });
        // 将按钮添加到工具栏区域（找到工具栏的第一个元素前插入）
        const toolbarElem = document.querySelector('#editor-container + div');
        if (toolbarElem) {
            toolbarElem.insertBefore(audioButton, toolbarElem.firstChild);
        }
    }

    async function refreshAll() {
        await refreshSubList();
        await refreshUploadSubSelect();
        await refreshFilterSubSelect();
        await refreshContentsList();
    }

    async function refreshSubList() {
        const data = await apiFetch(`/api/subcategories?parent=${currentParent}`);
        const subs = data.subs || [];
        const container = document.getElementById('subListAdmin');
        if (!subs.length) { container.innerHTML = '<div>暂无子分类，请添加</div>'; return; }
        container.innerHTML = subs.map(sub => `
            <div class="sub-badge">
                ${escapeHtml(sub)}
                <button class="del-sub" data-sub="${sub}">删除</button>
            </div>
        `).join('');
        document.querySelectorAll('.del-sub').forEach(btn => {
            btn.addEventListener('click', async () => {
                const subName = btn.getAttribute('data-sub');
                if (confirm(`删除子分类“${subName}”及其下所有内容？`)) {
                    await apiFetch(`/api/subcategories`, {
                        method: 'DELETE',
                        body: JSON.stringify({ parent: currentParent, subName }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    refreshAll();
                }
            });
        });
    }

    async function refreshUploadSubSelect() {
        const data = await apiFetch(`/api/subcategories?parent=${currentParent}`);
        const subs = data.subs || [];
        const select = document.getElementById('uploadSubSelect');
        select.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
        if (!subs.length) select.innerHTML = '<option disabled>请先添加子分类</option>';
    }

    async function refreshFilterSubSelect() {
        const data = await apiFetch(`/api/subcategories?parent=${currentParent}`);
        const subs = data.subs || [];
        const select = document.getElementById('filterSubSelect');
        select.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
        if (subs.length) {
            select.value = subs[0];
            await refreshContentsList();
        } else {
            document.getElementById('contentsListAdmin').innerHTML = '<div>暂无子分类</div>';
        }
        select.onchange = () => refreshContentsList();
    }

    async function refreshContentsList() {
        const sub = document.getElementById('filterSubSelect').value;
        if (!sub) return;
        const data = await apiFetch(`/api/contents?parent=${currentParent}&sub=${encodeURIComponent(sub)}`);
        const contents = data.contents || [];
        const container = document.getElementById('contentsListAdmin');
        if (!contents.length) { container.innerHTML = '<div>暂无内容</div>'; return; }
        container.innerHTML = contents.map(item => `
            <div class="content-item">
                <div><strong>${escapeHtml(item.title)}</strong><br><span style="font-size:0.8rem; color:#666;">${escapeHtml(item.summary)}</span></div>
                <button class="delete-content" data-id="${item.id}">删除</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-content').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm('删除此内容？')) {
                    await apiFetch(`/api/contents/${id}`, { method: 'DELETE' });
                    refreshContentsList();
                }
            });
        });
    }

    // 添加子分类
    document.getElementById('addSubBtn').onclick = async () => {
        const newName = document.getElementById('newSubName').value.trim();
        if (!newName) return alert('请输入名称');
        await apiFetch(`/api/subcategories`, {
            method: 'POST',
            body: JSON.stringify({ parent: currentParent, subName: newName }),
            headers: { 'Content-Type': 'application/json' }
        });
        document.getElementById('newSubName').value = '';
        refreshAll();
    };

    // 发布内容
    document.getElementById('publishBtn').onclick = async () => {
        const sub = document.getElementById('uploadSubSelect').value;
        const title = document.getElementById('titleInput').value.trim();
        if (!title) return alert('请输入标题');
        const html = editor.getHtml();
        if (!html || html === '<p><br></p>') return alert('请输入正文内容');
        await apiFetch(`/api/contents`, {
            method: 'POST',
            body: JSON.stringify({ parent: currentParent, sub, title, html }),
            headers: { 'Content-Type': 'application/json' }
        });
        alert('发布成功');
        document.getElementById('titleInput').value = '';
        editor.setHtml('');
        refreshAll();
    };

    // 切换主分类
    document.querySelectorAll('.admin-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            currentParent = btn.getAttribute('data-parent');
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            refreshAll();
        });
    });
    document.querySelector('.admin-tab').classList.add('active');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    initEditor().then(() => refreshAll());
</script>
</body>
</html>
